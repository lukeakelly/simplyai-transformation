<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Simplyai: Bash the Silos!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #050f1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #game-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      image-rendering: auto;
    }

    #loading-overlay {
      position: fixed;
      inset: 0;
      background: #050f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      color: #00d4ff;
      font-family: system-ui, sans-serif;
    }

    #loading-overlay h1 {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 900;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    #loading-overlay p {
      font-size: clamp(0.8rem, 2vw, 1rem);
      opacity: 0.7;
      margin-bottom: 2rem;
    }

    .loading-bar-wrap {
      width: min(400px, 80vw);
      height: 6px;
      background: rgba(0,212,255,0.15);
      border-radius: 3px;
      overflow: hidden;
    }

    .loading-bar {
      height: 100%;
      background: linear-gradient(90deg, #00d4ff, #0066ff);
      border-radius: 3px;
      animation: loadpulse 1.5s ease-in-out infinite;
    }

    @keyframes loadpulse {
      0%   { width: 10%; }
      50%  { width: 80%; }
      100% { width: 10%; }
    }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <h1>SIMPLYAI: BASH THE SILOS!</h1>
    <p>Loading transformation engine…</p>
    <div class="loading-bar-wrap">
      <div class="loading-bar"></div>
    </div>
  </div>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
